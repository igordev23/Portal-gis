<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web GIS Interface</title>
  <link href="css/output.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Tailwind CSS -->
  <link href="css/output.css" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  
  <!-- Leaflet Draw CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  
  <style>
    /* Garantir que o mapa ocupe toda a tela */
    #map {
      position: relative;
      z-index: 0;
    }
    
    /* Definir os botões para ficar sempre sobre o mapa */
    .map-button {
      position: absolute;
      z-index: 1000; /* Garantir que os botões fiquem acima do mapa */
      background-color: #1E40AF; /* Cor de fundo azul */
      padding: 10px;
      border-radius: 50%;
      box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    
    .map-button:hover {
      background-color: #2563EB; /* Cor de fundo ao passar o mouse */
    }

    
  </style>
</head>
<body class="bg-gray-100">
 
    <div id="map" class="w-full h-screen rounded-lg shadow-lg overflow-hidden">
        <header class="header">
            <img src="./assets/337a3c_d996bcdd649b4551873452079dd5a583~mv2.png" alt="Logo" class="logo" /> <!-- Substitua "sua-logo.png" pelo caminho da sua logo -->
            <h1 class="title">Portal GeoGIS</h1>
            
            <div class="search-container">
                <input type="text" placeholder="Search" class="search-input" />
                <button class="search-button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </header>
        
      </div>
      
      
      
  <!-- Botões ao redor do mapa -->
  <button id="base-map-btn" class="map-button"><i class="fas fa-map"></i></button>
  <div id="map-provider-menu" class="map-provider-menu hidden"></div>
  <button id="operational-layers-btn" class="map-button"><i class="fas fa-layer-group"></i></button>
  <div id="selector">
    <label>Escolha os GeoJSON:</label><br>
    <input type="checkbox" id="vias" value="vias.geojson" checked>
    <label for="vias">Vias</label><br>
    <input type="checkbox" id="areas" value="AREAS_URBANIZADAS.geojson">
    <label for="areas">AREAS URBANIZADAS</label><br>
    <input type="checkbox" id="limites" value="LIMITES_MUNICIPAIS.geojson">
    <label for="limites">LIMITES MUNICIPAIS</label><br>
    <input type="checkbox" id="localidades" value="LOCALIDADES.geojson">
    <label for="localidades">LOCALIDADES</label><br>
    <input type="checkbox" id="logradouros" value="LOGRADOUROS.geojson">
    <label for="logradouros">LOGRADOUROS</label><br>
    <input type="checkbox" id="pontos" value="PONTOS_DE_INTERESSE.geojson">
    <label for="pontos">PONTOS DE INTERESSE</label><br>
    <input type="checkbox" id="cobertura" value="COBERTURA_DO_SOLO.geojson">
    <label for="cobertura">COBERTURA DO SOLO</label><br>
</div>
  <button id="symbol-customization-btn" class="map-button"><i class="fas fa-paint-brush"></i></button>
  <button id="filter-layers-btn" class="map-button"><i class="fas fa-filter"></i></button>
  <button id="legend-btn" class="map-button"><i class="fas fa-list"></i></button>
  <button id="identify-btn" class="map-button"><i class="fas fa-search"></i></button>
  <button id="pan-btn" class="map-button"><i class="fas fa-arrows-alt"></i></button>
  <button id="home-btn" class="map-button"><i class="fas fa-home"></i></button>
  <button id="attribute-table-btn" class="map-button"><i class="fas fa-table"></i></button>
  <button id="measure-btn" class="map-button"><i class="fas fa-ruler"></i></button>
  <button id="terrain-profile-btn" class="map-button"><i class="fas fa-mountain"></i></button>
  <button id="swipe-tool-btn" class="map-button"><i class="fas fa-exchange-alt"></i></button>
  <button id="filter-features-btn" class="map-button"><i class="fas fa-filter"></i></button>
  <button id="print-btn" class="map-button"><i class="fas fa-print"></i></button>
  <button id="stat-analysis-btn" class="map-button"><i class="fas fa-chart-bar"></i></button>

  <div id="coordinates" style="
    position: absolute; 
    bottom: 10px; 
    left: 10px; 
    background: rgba(9, 16, 36, 0.8); /* Fundo azul com opacidade */
    padding: 5px 10px; /* Ajuste do padding para deixá-la menor */
    border-radius: 8px; /* Bordas mais arredondadas */
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); /* Sombra mais suave */
    color: white; /* Texto branco */
    font-size: 8px; /* Tamanho da fonte reduzido */
    z-index: 1000;
    display: flex; 
    align-items: center;
    justify-content: space-between;">
    <span>Coordenadas:</span> 
    <span id="coords" style="margin-left: 5px; font-weight: bold;">0, 0</span>
</div>


  <script type="module" src="./js/main.js"></script>
  
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
  <!-- Leaflet Draw JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
</body>
</html>
