<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS with PostGIS</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- Custom CSS -->
    <style>
        #map {
            height: 600px;
            width: 100%;
        }
        body {
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>

    <h1>Simple WebGIS with PostGIS Data</h1>
    <!-- Mapa Leaflet -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Custom JS -->
    <script>
        // Inicializa o mapa
        var map = L.map('map').setView([-23.5505, -46.6333], 12); // Coordenadas de São Paulo como exemplo

        // Adiciona a camada de fundo (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Função para carregar GeoJSON a partir do servidor
        async function loadGeoJSON() {
            try {
                // Fetch GeoJSON from your API endpoint
                let response = await fetch('http://localhost:3000/api/geojson');
                let geojsonData = await response.json();

                // Adiciona os dados GeoJSON ao mapa
                L.geoJSON(geojsonData).addTo(map);
            } catch (error) {
                console.error('Erro ao carregar GeoJSON:', error);
            }
        }

        // Chama a função para carregar o GeoJSON
        loadGeoJSON();
    </script>

</body>
</html>
